networks:
  proxy:
    external: true

services:
  web:
    build: .
    env_file:
      - .env
    volumes:
      # Named Volumes
      - rails_storage:/rails/storage
      - rails_db:/rails/db
    networks:
      - proxy
    restart: always
    ports:
      - 3000:3000
    deploy:
      # The app will have a minimum of 512mb ram and a max of 1024mb
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

volumes:
  rails_storage:
  rails_db:
